<style>
  * {
    box-sizing: border-box;
  }
  
  body {
    font-family: Arial;
    margin: 0;
  }
  
  /* Header */
  header {
    padding: 30px;
    text-align: center;
    background: #1abc9c;
    color: white;
  }
  
  /* Top navigation bar */
  .navbar {
    display: flex;
    background-color: #333;
  }
  
  /* Navigation bar links */
  .navbar a {
    color: white;
    padding: 14px 20px;
    text-decoration: none;
    text-align: center;
  }
  
  /* Change color on hover */
  .navbar a:hover {
    background-color: #ddd;
    color: black;
  }
  
  /* Column container */
  .container {
    display: flex;
    flex-wrap: wrap;
  }
  
  /* Sidebar/left column */
  .side {
    flex: 20%;
    background-color: #f1f1f1;
    padding: 20px;
  }
  
  /* Main column */
  .main {
    flex: 80%;
    background-color: white;
    padding: 20px;
  }
  
  /* Fake image, just for this example */
  .fakeimg {
    background-color: #aaa;
    width: 100%;
    padding: 20px;
  }
  
  /* Footer */
  footer {
    padding: 20px;
    text-align: center;
    background: #ddd;
  }
  
  /* Responsive layout - when the screen is less than 700px wide, make the two columns stack on top of each other instead of next to each other */
  @media screen and (max-width: 700px) {
    .container,
    .navbar {
      flex-direction: column;
    }
  }

  /************ Table Style *************/
  table {
  font-family: Arial, Helvetica, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  border: 1px solid #ddd;
  padding: 8px;
}

tr:nth-child(even){background-color: #f2f2f2;}

tr:hover {background-color: #ddd;}

th {
  padding-top: 12px;
  padding-bottom: 12px;
  text-align: left;
  background-color: #585cac;
  color: white;
}

/********Form Style*******/
form {
  border-radius: 5px;
  background-color: #f2f2f2;
  padding: 20px;
}

label {display: block;}

input[type=text], input[type=number], select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}

input[type=submit] {
  width: 100%;
  background-color: #82628e;
  color: white;
  padding: 14px;
  margin: 8px 0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

input[type=submit]:hover {
  background-color: #45a049;
}

/********* Message ********/
.alert-box {
  display: flex;
  align-items: center;
  padding: 16px;
  margin: 12px 0;
  border-radius: 6px;
  font-family: sans-serif;
  font-size: 14px;
}

.success-alert {
  background-color: #ecfdf5; /* Light mint green background */
  color: #065f46;            /* Deep forest green text */
  border: 1px solid #a7f3d0; /* Soft green border */
}

.alert-icon {
  margin-right: 12px;
  font-weight: bold;
  font-size: 18px;
}
</style>
